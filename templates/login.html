{% extends "base.html" %}
{% block title %}Football Pool{% endblock %}
{% block body %}
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <span class="ball">⚽</span>
            <h1>Football Pool</h1>
            <p>{{ t('login_subtitle') }}</p>
        </div>
        {% if error %}
        <div class="alert alert-error">
            <i class="fa fa-circle-exclamation"></i> {{ t('login_error') }}
        </div>
        {% endif %}
        <form method="POST" action="/login" class="login-form">
            <div class="form-group">
                <label for="username"><i class="fa fa-user"></i> {{ t('login_username') }}</label>
                <input type="text" id="username" name="username"
                    placeholder="{{ t('login_username_ph') }}"
                    autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fa fa-lock"></i> {{ t('login_password') }}</label>
                <input type="password" id="password" name="password"
                    placeholder="{{ t('login_password_ph') }}"
                    autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fa fa-right-to-bracket"></i> {{ t('login_submit') }}
            </button>
        </form>
        <div style="text-align:center;margin-top:20px;">
            <div class="lang-switcher" style="display:inline-flex;">
                <a href="/set-language/en" class="lang-btn {% if current_lang == 'en' %}active{% endif %}">EN</a>
                <a href="/set-language/hu" class="lang-btn {% if current_lang == 'hu' %}active{% endif %}">HU</a>
                <a href="/set-language/es" class="lang-btn {% if current_lang == 'es' %}active{% endif %}">ES</a>
                <a href="/set-language/de" class="lang-btn {% if current_lang == 'de' %}active{% endif %}">DE</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
